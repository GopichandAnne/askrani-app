name: CI

# Deterministic code gate on every push/PR — no secrets, no network.
# (The live-bot behavior smoke test lives in smoke.yml, on a schedule.)
on:
  push:
    branches: [main]
  pull_request:

jobs:
  app-typecheck:
    name: App typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  edge-tests:
    name: Edge function unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # node_modules provides the @supabase/supabase-js types the edge functions
      # import (npm: specifier); Deno resolves them from there during type-check.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --allow-env supabase/functions/_shared/
